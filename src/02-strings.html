<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budarina — 02 Strings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="stage" id="stage" data-view="home" data-stage="strings">
      <header class="topbar">
        <div class="brand-nav">
          <a class="brand" href="./02-strings.html">Budarina</a>
          <nav class="menu" aria-label="Primary">
            <a class="is-active" href="./02-strings.html">Home</a>
            <span class="dot" aria-hidden="true"></span>
            <a href="#" aria-disabled="true">Destinations</a>
          </nav>
        </div>
        <button type="button" class="chat-btn" disabled aria-disabled="true">
          <span class="chat-btn__label">Play</span>
        </button>
      </header>

      <!-- Still no side country selectors -->

      <div class="area" id="area" data-country="china">
        <div class="scene" id="scene">
          <div class="shadow" aria-hidden="true">
            <img class="shadow__layer shadow__layer--sharp" src="./shadow.svg" alt="" />
            <img class="shadow__layer shadow__layer--soft" src="./shadow.svg" alt="" />
            <img class="shadow__layer shadow__layer--softer" src="./shadow.svg" alt="" />
            <img class="shadow__layer shadow__layer--softest" src="./shadow.svg" alt="" />
          </div>
          <div id="container" class="strings"></div>
          <div class="roof" aria-hidden="true">
            <img id="roofImg" src="./roof-china.png" alt="" />
          </div>
        </div>
      </div>

      <div class="bottom-copy" id="bottomCopy">
        <section class="heading" aria-label="Intro">
          <p class="eyebrow">
            <span id="eyebrowText"
              ><strong>缘分</strong> (Yuánfèn) A destined meeting</span
            >
          </p>
          <h1 id="pageTitle">
            China — golden courtyards, silk-road myths, roofs that refuse gravity
          </h1>
        </section>

        <p class="aside" id="pageAside">
          Wander forbidden gardens, painted eaves, and stories older than the
          maps that tried to hold them.
        </p>
      </div>
    </div>

    <script type="module" src="./stage-strings.js"></script>
  </body>
</html>
